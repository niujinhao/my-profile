<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛锦豪正在努力打单中!!!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            color: white;
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }

        .name {
            font-size: 32px;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 10px;
        }

        .title {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 30px;
        }

        .skills-container {
            margin-top: 30px;
        }

        .skills-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e3a8a;
            margin-bottom: 15px;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .skill-tag {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: default;
        }

        .skill-tag:hover {
            transform: translateY(-10px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.5);
        }

        .skill-tag.learning {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #1e3a8a;
        }

        .divider {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4facfe, transparent);
            margin: 30px 0;
        }

        .contact {
            color: #64748b;
            font-size: 14px;
        }

        .achievement-text {
            color: #94a3b8;
            font-size: 12px;
            margin-top: 8px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .name {
                font-size: 26px;
            }

            .avatar {
                width: 120px;           
                height: 120px;
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">👤</div>
        <h1 class="name">牛锦豪</h1>
        <p class="title">我在控制你哈哈哈哈哈哈</p>

        <div class="divider"></div>

        <div class="skills-container">
            <h2 class="skills-title">技能标签</h2>
            <div class="skills">
                <span class="skill-tag">HTML</span>
                <span class="skill-tag">CSS</span>
                <span class="skill-tag">JavaScript</span>
                <span class="skill-tag learning">Vue（入门）</span>
                <span class="skill-tag learning">游戏代练</span>
            </div>
        </div>                              

        <div class="divider"></div>

        <p class="contact">今天比昨天强一点，继续努力吧</p>
        <p class="achievement-text">今日战绩：接了3单，赚了150</p>
    </div>
</body>
</html>
